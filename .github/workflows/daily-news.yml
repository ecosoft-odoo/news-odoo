name: Odoo 18.0 Daily News

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD), empty = yesterday ICT (Asia/Bangkok)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  daily-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run daily news
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DATE: ${{ github.event.inputs.date }}
        run: python scripts/fetch_and_post.py
